<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Catalogue</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      color: #222;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 20px;
    }

    button {
      background-color: #0b5f7a;
      color: white;
      border: none;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      margin-bottom: 20px;
    }

    button:hover {
      background-color: #084b61;
    }

    #booksList {
      width: 300px;
      border: 1px solid #999;
      min-height: 120px;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 30px;
      background-color: #f2f2f2;
    }

    .book-item {
      cursor: pointer;
      margin: 8px 0;
    }

    .book-item:hover {
      text-decoration: underline;
      color: #0b5f7a;
    }

    #bookDetails {
      width: 350px;
      border: 1px solid #999;
      min-height: 180px;
      padding: 15px;
      background-color: #f8f8f8;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Books Catalogue developed by s225752596</h1>

  <p>Click the button below to get all books items from the server:</p>

  <button id="getBooksBtn">Get all books</button>

  <div id="booksList"></div>

  <div id="bookDetails">
    <p><span class="label">Title:</span></p>
    <p><span class="label">Author:</span></p>
    <p><span class="label">Year:</span></p>
    <p><span class="label">Genre:</span></p>
    <p><span class="label">Summary:</span></p>
    <p><span class="label">Price (AUD):</span></p>
  </div>

  <script>
    const getBooksBtn = document.getElementById('getBooksBtn');
    const booksList = document.getElementById('booksList');
    const bookDetails = document.getElementById('bookDetails');

    function clearBookDetails() {
      bookDetails.innerHTML = `
        <p><span class="label">Title:</span></p>
        <p><span class="label">Author:</span></p>
        <p><span class="label">Year:</span></p>
        <p><span class="label">Genre:</span></p>
        <p><span class="label">Summary:</span></p>
        <p><span class="label">Price (AUD):</span></p>
      `;
    }

    function renderBooks(books) {
      booksList.innerHTML = '';

      if (!Array.isArray(books) || books.length === 0) {
        booksList.textContent = 'No books found';
        return;
      }

      books.forEach((book) => {
        const item = document.createElement('div');
        item.className = 'book-item';
        const price =
        typeof book.price === "string"
        ? book.price
        :book.price?.$numberDecimal || book.price;

item.textContent = `${book.title} ${price} ${book.currency}`;
        item.addEventListener('click', () => {
          fetchBookById(book.id);
        });
        booksList.appendChild(item);
      });
    }

    function renderBookDetails(book) {
      bookDetails.innerHTML = `
        <p><span class="label">Title:</span> ${book.title}</p>
        <p><span class="label">Author:</span> ${book.author}</p>
        <p><span class="label">Year:</span> ${book.year}</p>
        <p><span class="label">Genre:</span> ${book.genre}</p>
        <p><span class="label">Summary:</span> ${book.summary}</p>
        <p><span class="label">Price (AUD):</span> ${
        typeof book.price === "string"
        ? book.price
        : book.price?.$numberDecimal || book.price
        }</p>
      `;
    }

    async function fetchAllBooks() {
      try {
        clearBookDetails();
        const response = await fetch('/api/books');
        const result = await response.json();
        renderBooks(result.data);
      } catch (error) {
        booksList.textContent = 'Error fetching books';
      }
    }

    async function fetchBookById(id) {
      try {
        const response = await fetch(`/api/books/${id}`);
        const result = await response.json();
        renderBookDetails(result.data);
      } catch (error) {
        bookDetails.innerHTML = '<p>Error fetching book details</p>';
      }
    }

    getBooksBtn.addEventListener('click', fetchAllBooks);
  </script>
</body>
</html>
