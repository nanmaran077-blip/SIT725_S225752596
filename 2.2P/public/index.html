<!DOCTYPE html>
<html>
<head>
  <title>SIT725 Task 2.2P</title>
</head>
<body>
  <h1>Calculator App</h1>

  <h2>Add Two Numbers</h2>
  <form action="/add" method="GET">
    <input type="text" name="a" placeholder="First number" required>
    <input type="text" name="b" placeholder="Second number" required>
    <button type="submit">Add</button>
  </form>

  <h2>Square</h2>
  <form action="/square" method="GET">
    <input type="text" name="num" placeholder="Enter number" required>
    <button type="submit">Square</button>
  </form>
</body>
</html>
